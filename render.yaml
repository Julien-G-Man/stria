services:
  - type: web
    name: stria-api
    runtime: python
    buildCommand: pip install poetry && poetry install --no-root
    startCommand: poetry run python -m uvicorn stria.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
